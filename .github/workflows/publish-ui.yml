name: Publish ui

# Publishes @karyl-chan/ui to the public npm registry.
# Trigger by pushing a tag of the form `ui-v<semver>`, e.g.
#   git tag ui-v0.1.0 && git push origin ui-v0.1.0
# release-please cuts this tag when its release PR for ui is merged.
# The tag prefix keeps ui releases distinct from bot / plugin-sdk
# releases.
#
# Unlike plugin-sdk, ui ships its source directly (exports point at
# `./src/*.ts` and `./src/**/*.vue`) — consumers (bot frontend, plugin
# webuis) all run their own Vite + Vue pipeline and prefer compiling
# the .vue SFCs in their own build context. So there's no build step
# here; we just `pnpm publish` the package as-is.
#
# Authenticates via npm Trusted Publishers (OIDC) — no NPM_TOKEN
# secret needed. Configure the trusted publisher on npmjs.com:
#   @karyl-chan org → Packages → @karyl-chan/ui → Settings
#   → Trusted Publishers → Add (GitHub Actions, karyl-chan/karyl-chan,
#   workflow: publish-ui.yml).
# For the first-ever publish (package not yet on npm), use npm's
# "pending trusted publisher" form on the org page instead.
on:
  push:
    tags:
      - 'ui-v*'
  workflow_dispatch:

permissions:
  contents: read
  # OIDC: lets the runner mint an ID token the npm registry can verify
  # against the trusted-publisher configuration.
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # --no-git-checks: the tag commit is checked out detached, which
      # pnpm publish would otherwise reject.
      # --provenance: attaches a SLSA build-provenance attestation
      # (verified-publisher badge on npm); requires id-token: write.
      - name: Publish
        run: pnpm --filter @karyl-chan/ui publish --no-git-checks --provenance
