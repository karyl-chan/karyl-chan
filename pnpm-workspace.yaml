packages:
  - 'packages/*'
  # frontend is nested inside the bot package but is still a workspace
  # member so a single `pnpm install` at the root resolves its deps too.
  - 'packages/bot/frontend'
  # Cross-service E2E + chaos harness. A workspace member only so
  # `pnpm install` resolves its devDeps (@types/node, ioredis, tsc).
  # It exposes NO `test` script, so `pnpm -r test` never runs it — the
  # E2E/chaos scenarios are invoked explicitly via `pnpm --dir e2e e2e`
  # and are themselves env-gated (see e2e/README.md).
  - 'e2e'

# pnpm 11 no longer reads the `pnpm` field in package.json; settings
# live here. pnpm 11 also replaced the v10 `onlyBuiltDependencies`
# array with a map-shaped `allowBuilds` setting (true = allow,
# false = deny). pnpm 11 errors on any unlisted ignored build where
# pnpm 10 only warned, so every native-module dependency must be
# enumerated.
allowBuilds:
  # All four packages ship native bindings or platform-specific binaries
  # that legitimately need their postinstall to run. sqlite3 source-builds
  # via the .npmrc build_from_source rule.
  '@discordjs/opus': true
  better-sqlite3: true
  sqlite3: true
  esbuild: true
  # protobufjs is pulled in transitively by @opentelemetry/auto-
  # instrumentations-node (its grpc instrumentation → @grpc/grpc-js).
  # We export traces over OTLP/HTTP+JSON (@opentelemetry/exporter-trace-
  # otlp-http), never protobuf/grpc, so protobufjs's postinstall codegen
  # is dead weight — deny the build.
  protobufjs: false
