packages:
  - 'packages/*'
  # frontend is nested inside the bot package but is still a workspace
  # member so a single `pnpm install` at the root resolves its deps too.
  - 'packages/bot/frontend'

# pnpm 11 no longer reads the `pnpm` field in package.json; settings
# live here. pnpm 11 also replaced the v10 `onlyBuiltDependencies`
# array with a map-shaped `allowBuilds` setting (true = allow,
# false = deny). pnpm 11 errors on any unlisted ignored build where
# pnpm 10 only warned, so every native-module dependency must be
# enumerated.
allowBuilds:
  '@discordjs/opus': true
  better-sqlite3: true
  sqlite3: true
  esbuild: true
